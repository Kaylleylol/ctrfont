name: ctrfont

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true

      - name: Add devkitPro pacman repository
        shell: msys2 {0}
        run: |
          curl -LO https://downloads.devkitpro.org/devkitpro-keyring.pkg.tar.xz
          pacman -U --noconfirm --nodeps --needed devkitpro-keyring.pkg.tar.xz || true
          cat >> /etc/pacman.conf << 'EOF'

          [dkp-libs]
          SigLevel = Optional TrustAll
          Server = https://downloads.devkitpro.org/packages

          [dkp-windows]
          SigLevel = Optional TrustAll
          Server = https://downloads.devkitpro.org/packages/windows
          EOF
          pacman -Sy --noconfirm

      - name: Install 3ds-dev
        shell: msys2 {0}
        run: pacman -S --noconfirm 3ds-dev

      - name: Set devkitPro environment
        shell: msys2 {0}
        run: |
          export PATH="$PATH:/opt/devkitpro/tools/bin"
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=/opt/devkitpro/devkitARM

      - name: Verify mkbcfnt
        shell: msys2 {0}
        run: |
          export PATH="$PATH:/opt/devkitpro/tools/bin"
          mkbcfnt --version || mkbcfnt --help